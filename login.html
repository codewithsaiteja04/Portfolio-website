<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
</head>
<body>
    <h1><em>login page</em></h1>
    <form action="dashboard.html">
        <label for="username">username:</label>
<input type="text" name="username" required id="username" placeholder="enter username"><br><br>
<label for="password">password:</label>
<input type="password" name="password" required id="password" placeholder="enter password"><br><br>
<button type="submit">submit</button>
<button type="reset">reset</button>
<p><strong>note:</strong>(This is a demo login page. you can enter any username and password to continue)</p>
    </form>
    
</body>
</html>
